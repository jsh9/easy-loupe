---
name: Python package
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    name: Test Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        python-version: ['3.13']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Ubuntu Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          # See AGENTS.md verification notes for Linux CI display-backend tradeoffs.
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0
      - name: Prepare Linux Qt runtime directory
        if: runner.os == 'Linux'
        env:
          XDG_RUNTIME_DIR: /tmp/qt-runtime-${{ github.run_id }}
        run: |
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox tox-gh-actions uv
      - name: Sync project environment
        run: uv sync --extra dev
      - name: Test with tox (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
          # Keep Linux rendering software-based in CI for stability.
          QT_OPENGL: software
          LIBGL_ALWAYS_SOFTWARE: '1'
          XDG_RUNTIME_DIR: /tmp/qt-runtime-${{ github.run_id }}
        # See AGENTS.md verification notes for the Linux/macOS/Windows CI
        # display-backend rationale and risk tradeoffs.
        run: tox
      - name: Test with tox
        if: runner.os != 'Linux'
        # See AGENTS.md verification notes for CI display-backend rationale.
        run: tox
