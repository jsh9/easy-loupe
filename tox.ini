[tox]
envlist =
    py312
    py313
    ty
    muff-lint
    muff-format
    pre-commit

[gh-actions]
python =
    3.12: py312, ty, muff-lint, muff-format, pre-commit
    3.13: py313, ty, muff-lint, muff-format, pre-commit

[testenv]
package =
    wheel
wheel_build_env =
    .pkg
deps =
    pytest
pass_env =
    QT_QPA_PLATFORM
    QT_OPENGL
    LIBGL_ALWAYS_SOFTWARE
    XDG_RUNTIME_DIR
commands =
    pytest --tb=long

[testenv:muff-lint]
deps =
    muff==0.14.11
skip_install = true
commands =
    muff check --fix --config=muff.toml easy_loupe tests

[testenv:muff-format]
deps =
    muff==0.14.11
skip_install = true
commands =
    # use the '--diff' flag to avoid accidentally formatting code
    muff format --diff --config=muff.toml easy_loupe tests

[testenv:ty]
deps =
    ty
    uv
skip_install = true
commands =
    uv sync --active --extra dev --frozen --inexact
    ty check --python {env_dir} easy_loupe tests

[testenv:pre-commit]
skip_install = true
deps =
    pre-commit
set_env =
    # Skip auto-fixing hooks here to keep `tox -e pre-commit` non-destructive.
    SKIP = muff-format
commands =
    pre-commit run -a
